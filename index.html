<!doctype html>
<html>
    <head>
        <title>Příběhy 2</title>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <style>
            @font-face {
                font-family: Pixelbasel;
                src: url("assets/pixelbasel.woff2");
            }
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                height: 100%;
                width: 100%;
            }
            * {
                font-family: Pixelbasel;
                font-size: 20px;
                font-smooth: never;
                -webkit-font-smoothing: none;
                -moz-osx-font-smoothing: none;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                -ms-user-select: none;
            }
            #ui {
                position: absolute;
                left: 0;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
            }
            #joystick-container {
                position: absolute;
                left: 0;
                right: 0;
                top: 50%;
                bottom: 0;
            }
            #joystick {
                z-index: 1;
                position: absolute;
                left: 50%;
                top: 70%;
                opacity: 0.6;
                overflow: visible;
            }
            #text {
                z-index: 5;
                position: absolute;
                top: 20px;
                left: 25px;
                right: 25px;
                height: fit-content;
                image-rendering: pixelated;
                text-align: center;
                max-height: 25%;
                overflow-y: scroll;
                overflow-x: hidden;
                overscroll-behavior-y: none;
            }
            #text:has(span:not(:empty)) {
                padding: 10px;
                background-color: #e0e0e0;
                border-radius: 3px;
                /*border: 4px solid;
                border-image: url("assets/frame.png") 8 fill / 16px repeat;*/
            }
            #content {
                z-index: 100;
                display: flex;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
            #content:empty {
                display: none;
                pointer-events: none;
            }
            #answers {
                z-index: 10;
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 10px;
                display: flex;
                flex-direction: column;
                justify-self: center;
                width: 85%;
                max-width: 500px;
            }
            button {
                margin: 0.15rem;
                border: none;
                border-radius: 3px;
                cursor: pointer;
                padding: 0.35rem;
            }
            button {
                background-color: #e0e0e0;
            }
            button.active {
                background-color: #b3b3b3;
            }
        </style>
    </head>
    <body>
        <script>
            var gameVersion = "0.0.0";
            fetch("./version.txt")
                .then((response) => response.text())
                .then((text) => {
                    gameVersion = text.trim();
                    document.getElementById("version").textContent =
                        "v" + gameVersion;
                })
                .catch((err) => {
                    console.error(err);
                });
            window.params = new URLSearchParams(location.search);
        </script>
        <script type="module" src="script.js"></script>
        <div id="ui">
            <div style="position: absolute; font-size: 15px">
                <span id="version" style="font-size: inherit">v0.0.0</span>
                <span id="fps" style="font-size: inherit">fps: 0</span>
            </div>
            <div id="text">
                <span id="text-visible" style="white-space: pre-wrap"></span
                ><span
                    id="text-invisible"
                    style="white-space: pre-wrap; visibility: hidden"
                ></span>
            </div>
            <div id="answers">
                <button>test 123 456 789</button>
                <button>test 123 456 789</button>
                <button>test 123 456 789</button>
                <button>test 123 456 789</button>
                <button>test 123 456 789</button>
                <button>test 123 456 789</button>
            </div>
            <div id="content"></div>
            <div style="z-index: 10; position: absolute; bottom: 0">
                <button onpointerdown="location.reload()" style="padding: 10px">
                    reload
                </button>
                <button
                    onpointerdown="location.href='?debug'"
                    style="padding: 10px"
                >
                    debug
                </button>
            </div>
            <button
                id="interact"
                onclick="main.player.interact()"
                disabled
                style="
                    padding: 10px;
                    z-index: 10;
                    position: absolute;
                    bottom: 0;
                    right: 0;
                "
            >
                interact
            </button>
            <div id="joystick-container">
                <svg id="joystick">
                    <circle
                        id="joystick-base"
                        cx="0"
                        cy="0"
                        r="70"
                        fill="#555555"
                    />
                    <circle
                        id="joystick-stick"
                        cx="0"
                        cy="0"
                        r="35"
                        fill="#bbbbbbbb"
                    />
                </svg>
            </div>
        </div>
    </body>
</html>
